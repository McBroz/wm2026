<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 2026 Tippspiel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #C8102E;
    --gold: #FFD700;
    --dark: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --surface3: #252535;
    --text: #f0f0f5;
    --text2: #8888a0;
    --border: rgba(255,255,255,0.08);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; }
  .logo span { color: var(--primary); }
  .nav { display: flex; gap: 0.5rem; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .nav-btn:hover, .nav-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .user-badge { font-size: 0.85rem; color: var(--text2); }
  .user-badge strong { color: var(--text); }
  .page { display: none; max-width: 960px; margin: 0 auto; padding: 2rem; }
  .page.active { display: block; }
  #page-login { max-width: 420px; padding-top: 5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.3rem; }
  .page-sub { color: var(--text2); font-size: 0.88rem; margin-bottom: 1.8rem; line-height: 1.6; }
  .form-group { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], input[type=password], input[type=number] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 0.95rem; outline: none; transition: border 0.2s; }
  input:focus { border-color: var(--primary); }
  .btn { background: var(--primary); border: none; color: #fff; padding: 11px 20px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; width: 100%; }
  .btn:hover { opacity: 0.88; }
  .btn-sm { width: auto; padding: 7px 16px; font-size: 0.82rem; }
  .err { color: #ff6b6b; font-size: 0.84rem; margin-top: 0.8rem; display: none; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 1.2rem; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
  .stat-val.gold { color: var(--gold); }
  .stat-val.red { color: var(--primary); }
  .stat-lbl { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .ranking-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .ranking-row { display: grid; grid-template-columns: 44px 1fr 64px 64px; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border); }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row.header { background: var(--surface3); font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 0.55rem 1.2rem; }
  .ranking-row.me { background: rgba(200,16,46,0.07); }
  .rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--text2); }
  .rank-num.p1 { color: var(--gold); }
  .rank-num.p2 { color: #C0C0C0; }
  .rank-num.p3 { color: #CD7F32; }
  .rank-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold); text-align: center; }
  .rank-games { font-size: 0.85rem; color: var(--text2); text-align: center; }
  .group-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.2rem; overflow: hidden; }
  .group-hdr { background: var(--surface3); padding: 0.6rem 1.2rem; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; color: var(--primary); }
  .match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0.85rem 1.2rem; border-bottom: 1px solid var(--border); gap: 0.8rem; }
  .match-row:last-child { border-bottom: none; }
  .team { font-size: 0.9rem; font-weight: 500; }
  .team.r { text-align: right; }
  .score-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .score-inp { width: 46px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 4px; color: var(--text); font-size: 1.05rem; font-weight: 600; text-align: center; outline: none; -moz-appearance: textfield; }
  .score-inp::-webkit-inner-spin-button, .score-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
  .score-inp:focus { border-color: var(--primary); }
  .score-sep { color: var(--text2); font-weight: 600; }
  .badge { font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .badge.ok { background: rgba(39,174,96,0.18); color: #2ecc71; }
  .badge.half { background: rgba(243,156,18,0.15); color: #f39c12; }
  .badge.no { background: rgba(231,76,60,0.12); color: #e74c3c; }
  .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
  .save-status { font-size: 0.84rem; color: var(--text2); }
  .save-status.saved { color: #2ecc71; }
  #toast { position: fixed; bottom: 76px; right: 2rem; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; font-size: 0.86rem; z-index: 200; opacity: 0; transform: translateY(6px); transition: all 0.25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.s { border-color: #2ecc71; color: #2ecc71; }
  #toast.e { border-color: #e74c3c; color: #e74c3c; }
  .overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.88); display: flex; align-items: center; justify-content: center; z-index: 300; flex-direction: column; gap: 1rem; }
  .spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .admin-row { display: grid; grid-template-columns: 1fr auto 1fr auto; align-items: center; padding: 0.85rem 1.2rem; border-bottom: 1px solid var(--border); gap: 0.8rem; }
  .admin-row:last-child { border-bottom: none; }
  .refresh-btn { background: var(--surface3); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
  @media(max-width:600px) { header { padding: 0 1rem; } .page { padding: 1rem; } .match-row { gap: 0.4rem; } .team { font-size: 0.78rem; } }
</style>
</head>
<body>

<div id="overlay" class="overlay"><div class="spin"></div><div style="color:var(--text2);font-size:0.88rem">Laden...</div></div>
<div id="toast"></div>

<header>
  <div class="logo">WM<span>26</span> Tippspiel</div>
  <div class="nav" id="nav" style="display:none">
    <button class="nav-btn active" onclick="go('rangliste')">Rangliste</button>
    <button class="nav-btn" onclick="go('tipps')">Meine Tipps</button>
    <button class="nav-btn" id="admin-btn" style="display:none" onclick="go('admin')">Admin</button>
    <button class="nav-btn" style="border-color:transparent;color:var(--text2)" onclick="logout()">Abmelden</button>
  </div>
  <div id="uinfo" class="user-badge" style="display:none">Eingeloggt: <strong id="uname"></strong></div>
</header>

<div class="page active" id="page-login">
  <div class="card">
    <div class="page-title">WM 2026</div>
    <div class="page-sub">Gib deinen Namen ein. Neue Spieler werden automatisch registriert.</div>
    <div class="form-group"><label>Dein Name</label><input type="text" id="ln" placeholder="Vorname Nachname" maxlength="30" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="form-group" id="apwg" style="display:none"><label>Admin-Passwort</label><input type="password" id="apw" onkeydown="if(event.key==='Enter')login()"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
      <input type="checkbox" id="isa" onchange="document.getElementById('apwg').style.display=this.checked?'block':'none'" style="width:auto">
      <label for="isa" style="text-transform:none;font-size:0.88rem;color:var(--text2);cursor:pointer;margin:0">Als Admin einloggen</label>
    </div>
    <button class="btn" onclick="login()">Einloggen</button>
    <div class="err" id="lerr"></div>
  </div>
</div>

<div class="page" id="page-rangliste">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
    <div class="section-title" style="margin:0">🏆 Rangliste</div>
    <button class="refresh-btn" onclick="loadRangliste()">↻ Aktualisieren</button>
  </div>
  <div class="stats-row" id="gstats"></div>
  <div class="ranking-table">
    <div class="ranking-row header"><div>#</div><div>Name</div><div style="text-align:center">Punkte</div><div style="text-align:center">Spiele</div></div>
    <div id="rlist"></div>
  </div>
</div>

<div class="page" id="page-tipps">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
    <div class="section-title" style="margin:0">⚽ Meine Tipps</div>
    <div id="myscore" style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold)"></div>
  </div>
  <div id="gcontainer"></div>
  <div style="height:70px"></div>
</div>

<div class="page" id="page-admin">
  <div class="section-title">🔧 Admin — Ergebnisse eintragen</div>
  <p style="color:var(--text2);font-size:0.85rem;margin-bottom:1.5rem">Trage die offiziellen Ergebnisse ein. Punkte werden sofort berechnet.</p>
  <div id="acontainer"></div>
  <div style="height:70px"></div>
</div>

<div class="save-bar" id="savebar" style="display:none">
  <span class="save-status" id="savestatus">Änderungen nicht gespeichert</span>
  <button class="btn btn-sm" onclick="saveTipps()">💾 Speichern</button>
</div>

<script>
const SUPABASE_URL = 'https://tjrybgrdjvntdbjdlyio.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqcnliZ3JkanZudGRiamRseWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDk3MTMsImV4cCI6MjA5NjQyNTcxM30.socQYgTkbSm0VZ9H5_7BoXY_PvhyjKSMrtWnDtKa6XI';
const ADMIN_PW = 'pe2026admin';  // <-- Admin-Passwort hier ändern falls gewünscht

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GROUPS = {
  A:['Mexiko','Südafrika','Südkorea','Tschechien'],
  B:['Kanada','Bosnien-Herzegowina','Katar','Schweiz'],
  C:['Brasilien','Marokko','Haiti','Schottland'],
  D:['USA','Paraguay','Australien','Türkei'],
  E:['Deutschland','Curaçao','Elfenbeinküste','Ecuador'],
  F:['Niederlande','Japan','Schweden','Tunesien'],
  G:['Belgien','Ägypten','Iran','Neuseeland'],
  H:['Spanien','Kap Verde','Saudi-Arabien','Uruguay'],
  I:['Frankreich','Senegal','Irak','Norwegen'],
  J:['Argentinien','Algerien','Österreich','Jordanien'],
  K:['Portugal','DR Kongo','Usbekistan','Kolumbien'],
  L:['England','Kroatien','Ghana','Panama']
};

function getMatches(g) {
  const t=GROUPS[g],m=[];
  for(let i=0;i<t.length;i++) for(let j=i+1;j<t.length;j++)
    m.push({id:`${g}_${i}_${j}`,home:t[i],away:t[j]});
  return m;
}
function allMatches(){ return Object.keys(GROUPS).flatMap(g=>getMatches(g)); }

let ME=null, ADMIN=false, DIRTY=false;
let myTipps={}, allResults={};

function pts(th,ta,rh,ra){
  if(th===null||ta===null||rh===null||ra===null) return null;
  if(th===rh&&ta===ra) return 3;
  return Math.sign(th-ta)===Math.sign(rh-ra)?1:0;
}

function toast(msg,type='s'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  setTimeout(()=>t.className='',2500);
}
function loading(on){ document.getElementById('overlay').style.display=on?'flex':'none'; }
function showErr(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',4000); }

function go(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  const btn=document.querySelector(`.nav-btn[onclick="go('${name}')"]`);
  if(btn) btn.classList.add('active');
  document.getElementById('savebar').style.display=name==='tipps'?'flex':'none';
  if(name==='rangliste') loadRangliste();
  if(name==='tipps') loadTipps();
  if(name==='admin') loadAdmin();
}

async function login(){
  const name=document.getElementById('ln').value.trim();
  const isAdmin=document.getElementById('isa').checked;
  const apw=document.getElementById('apw').value;
  if(name.length<2){showErr('lerr','Name zu kurz (min. 2 Zeichen)');return;}
  if(isAdmin&&apw!==ADMIN_PW){showErr('lerr','Falsches Admin-Passwort');return;}
  loading(true);
  try {
    // Check if player exists
    const {data:existing}=await sb.from('players').select('name').ilike('name',name).single();
    if(!existing){
      // Check name not taken (case insensitive)
      const {data:check}=await sb.from('players').select('name').ilike('name',name);
      if(check&&check.length>0){showErr('lerr','Dieser Name ist bereits vergeben');loading(false);return;}
      await sb.from('players').insert({name});
    }
    ME=existing?.name||name; ADMIN=isAdmin;
    document.getElementById('uname').textContent=ME;
    document.getElementById('uinfo').style.display='block';
    document.getElementById('nav').style.display='flex';
    document.getElementById('admin-btn').style.display=ADMIN?'inline-block':'none';
    go('rangliste');
  } catch(e){ showErr('lerr','Fehler: '+e.message); }
  finally { loading(false); }
}

function logout(){
  ME=null;ADMIN=false;myTipps={};allResults={};
  document.getElementById('nav').style.display='none';
  document.getElementById('uinfo').style.display='none';
  document.getElementById('ln').value='';
  document.getElementById('isa').checked=false;
  document.getElementById('apwg').style.display='none';
  go('login');
}

async function loadRangliste(){
  loading(true);
  try {
    const [{data:players},{data:tipps},{data:results}]=await Promise.all([
      sb.from('players').select('name').order('created_at'),
      sb.from('tipps').select('*'),
      sb.from('results').select('*')
    ]);
    const resMap={};
    (results||[]).forEach(r=>resMap[r.match_id]={h:r.home,a:r.away});
    const ranking=(players||[]).map(({name})=>{
      const ut=(tipps||[]).filter(t=>t.player_name===name);
      let p=0,g=0;
      ut.forEach(t=>{
        const r=resMap[t.match_id];
        if(r){const pt=pts(t.home,t.away,r.h,r.a);if(pt!==null){p+=pt;g++;}}
      });
      return{name,p,g};
    }).sort((a,b)=>b.p-a.p||b.g-a.g);
    const played=Object.keys(resMap).length;
    document.getElementById('gstats').innerHTML=`
      <div class="stat-card"><div class="stat-val gold">${(players||[]).length}</div><div class="stat-lbl">Teilnehmer</div></div>
      <div class="stat-card"><div class="stat-val red">${played}</div><div class="stat-lbl">Spiele gespielt</div></div>
      <div class="stat-card"><div class="stat-val">${allMatches().length}</div><div class="stat-lbl">Spiele total</div></div>
      <div class="stat-card"><div class="stat-val gold">${ranking[0]?.p||0}</div><div class="stat-lbl">Höchste Punkte</div></div>`;
    const list=document.getElementById('rlist');
    if(!ranking.length){list.innerHTML='<div style="padding:2rem;text-align:center;color:var(--text2)">Noch keine Teilnehmer</div>';return;}
    list.innerHTML=ranking.map(({name,p,g},i)=>`
      <div class="ranking-row${name===ME?' me':''}">
        <div class="rank-num${i===0?' p1':i===1?' p2':i===2?' p3':''}">${i+1}</div>
        <div>${name}${name===ME?' <span style="font-size:0.72rem;color:var(--primary)">(Du)</span>':''}</div>
        <div class="rank-pts">${p}</div>
        <div class="rank-games">${g}</div>
      </div>`).join('');
  } catch(e){ toast('Fehler: '+e.message,'e'); }
  finally { loading(false); }
}

async function loadTipps(){
  loading(true);
  try {
    const [{data:tipps},{data:results}]=await Promise.all([
      sb.from('tipps').select('*').eq('player_name',ME),
      sb.from('results').select('*')
    ]);
    myTipps={};
    (tipps||[]).forEach(t=>myTipps[t.match_id]={h:t.home,a:t.away});
    allResults={};
    (results||[]).forEach(r=>allResults[r.match_id]={h:r.home,a:r.away});
    renderTipps();
  } catch(e){ toast('Fehler: '+e.message,'e'); }
  finally { loading(false); }
}

function renderTipps(){
  let tp=0,tg=0;
  document.getElementById('gcontainer').innerHTML=Object.keys(GROUPS).map(g=>{
    const rows=getMatches(g).map(m=>{
      const tip=myTipps[m.id]||{h:null,a:null};
      const res=allResults[m.id];
      const p=(tip.h!==null&&tip.a!==null&&res)?pts(tip.h,tip.a,res.h,res.a):null;
      if(p!==null){tp+=p;tg++;}
      const badge=p===3?'<span class="badge ok">+3 ✓✓</span>':p===1?'<span class="badge half">+1 ✓</span>':p===0?'<span class="badge no">+0</span>':'';
      return `<div class="match-row">
        <div class="team r">${m.home}</div>
        <div class="score-wrap">
          <input type="number" class="score-inp" min="0" max="30" value="${tip.h!==null?tip.h:''}" placeholder="-"
            onchange="setTip('${m.id}','h',this.value)" oninput="dirty()">
          <span class="score-sep">:</span>
          <input type="number" class="score-inp" min="0" max="30" value="${tip.a!==null?tip.a:''}" placeholder="-"
            onchange="setTip('${m.id}','a',this.value)" oninput="dirty()">
          ${badge}
        </div>
        <div class="team">${m.away}</div>
      </div>`;
    }).join('');
    return `<div class="group-block"><div class="group-hdr">Gruppe ${g}</div>${rows}</div>`;
  }).join('');
  document.getElementById('myscore').textContent=tg>0?`${tp} Punkte`:'';
  updateSaveStatus();
  DIRTY=false;
}

function setTip(id,side,val){
  if(!myTipps[id]) myTipps[id]={h:null,a:null};
  myTipps[id][side]=val===''?null:parseInt(val);
}
function dirty(){ DIRTY=true; updateSaveStatus(); }
function updateSaveStatus(){
  const el=document.getElementById('savestatus');
  el.textContent=DIRTY?'Ungespeicherte Änderungen':'Tipps gespeichert ✓';
  el.className='save-status'+(DIRTY?'':' saved');
}

async function saveTipps(){
  loading(true);
  try {
    const upserts=Object.entries(myTipps)
      .filter(([,t])=>t.h!==null&&t.a!==null)
      .map(([match_id,t])=>({player_name:ME,match_id,home:t.h,away:t.a}));
    if(upserts.length){
      const {error}=await sb.from('tipps').upsert(upserts,{onConflict:'player_name,match_id'});
      if(error) throw error;
    }
    DIRTY=false; updateSaveStatus();
    toast('Tipps gespeichert!','s');
  } catch(e){ toast('Fehler: '+e.message,'e'); }
  finally { loading(false); }
}

async function loadAdmin(){
  if(!ADMIN) return;
  loading(true);
  try {
    const {data:results}=await sb.from('results').select('*');
    allResults={};
    (results||[]).forEach(r=>allResults[r.match_id]={h:r.home,a:r.away});
    document.getElementById('acontainer').innerHTML=Object.keys(GROUPS).map(g=>{
      const rows=getMatches(g).map(m=>{
        const res=allResults[m.id]||{h:'',a:''};
        return `<div class="admin-row">
          <div class="team r">${m.home}</div>
          <div class="score-wrap">
            <input type="number" class="score-inp" min="0" max="30" value="${res.h!==null&&res.h!==''?res.h:''}" placeholder="-"
              onchange="setRes('${m.id}','h',this.value)">
            <span class="score-sep">:</span>
            <input type="number" class="score-inp" min="0" max="30" value="${res.a!==null&&res.a!==''?res.a:''}" placeholder="-"
              onchange="setRes('${m.id}','a',this.value)">
          </div>
          <div class="team">${m.away}</div>
          <button class="btn btn-sm" onclick="saveRes('${m.id}')">✓</button>
        </div>`;
      }).join('');
      return `<div class="group-block"><div class="group-hdr">Gruppe ${g}</div>${rows}</div>`;
    }).join('');
  } catch(e){ toast('Fehler: '+e.message,'e'); }
  finally { loading(false); }
}

function setRes(id,side,val){
  if(!allResults[id]) allResults[id]={h:null,a:null};
  allResults[id][side]=val===''?null:parseInt(val);
}

async function saveRes(id){
  const r=allResults[id];
  if(!r||r.h===null||r.a===null){toast('Beide Tore eintragen','e');return;}
  loading(true);
  try {
    const {error}=await sb.from('results').upsert({match_id:id,home:r.h,away:r.a},{onConflict:'match_id'});
    if(error) throw error;
    toast('Ergebnis gespeichert!','s');
  } catch(e){ toast('Fehler: '+e.message,'e'); }
  finally { loading(false); }
}

window.onload=()=>{ loading(false); document.getElementById('ln').focus(); };
</script>
</body>
</html>
